<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Staffly</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >
  <style>
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: hsl(240 10% 5.5%);
      color: hsl(240 8% 96%);
      font-family: 'Inter', system-ui, sans-serif;
      z-index: 9999;
    }
    #splash .splash-logo {
      display: grid;
      place-items: center;
      width: 3rem;
      height: 3rem;
      border-radius: 0.75rem;
      background: hsl(250 89% 62%);
      color: white;
    }
    #splash .splash-logo svg {
      width: 1.6rem;
      height: 1.6rem;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    #splash .splash-brand {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: hsl(240 8% 96%);
    }
    #splash .splash-pulse {
      width: 3rem;
      height: 2px;
      background: hsl(240 8% 16%);
      border-radius: 1px;
      overflow: hidden;
      position: relative;
    }
    #splash .splash-pulse::after {
      content: '';
      position: absolute;
      top: 0;
      left: -40%;
      width: 40%;
      height: 100%;
      background: hsl(250 89% 62%);
      border-radius: 1px;
      animation: splash-slide 1.2s ease-in-out infinite;
    }
    @keyframes splash-slide {
      0% { left: -40%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <app-root>
    <div id="splash">
      <div class="splash-logo">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 2v4"/>
          <path d="M16 2v4"/>
          <rect width="18" height="18" x="3" y="4" rx="2"/>
          <path d="M3 10h18"/>
        </svg>
      </div>
      <span class="splash-brand">Staffly</span>
      <div class="splash-pulse"></div>
    </div>
  </app-root>
</body>
</html>
